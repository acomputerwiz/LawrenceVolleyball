<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#ec4899">
    <link rel="icon" href="/logos/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/logos/favicon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Elevate Lawrence Volleyball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
        <a href="/" class="logo"><span>ELEVATE</span> LAWRENCE VOLLEYBALL</a>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/coaches/">Coaches</a>
            <a href="/#open-gym">Open Gym</a>
            <a href="/schedule/">Schedule</a>
            <a href="/tryouts/">Tryouts</a>
            <a href="/sponsors/">Sponsors</a>
            <a href="/#contact">Contact</a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<section class="page-hero centered" style="min-height:70vh; display:flex; align-items:center;">
    <div class="container" style="text-align:center;">
        <div style="font-family:var(--font-display); font-size:clamp(5rem,15vw,10rem); color:var(--pink); line-height:1; margin-bottom:16px;">404</div>
        <h1 class="section-title light" style="font-size:clamp(1.5rem,4vw,2.5rem);">PAGE NOT FOUND</h1>
        <p style="color:var(--gray-300); margin-bottom:32px;">Looks like this ball went out of bounds.</p>
        <a href="/" class="btn btn-gold">Back to Home</a>
    </div>
</section>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('open');
        hamburger.setAttribute('aria-expanded', navLinks.classList.contains('open'));
    });
    navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => { navLinks.classList.remove('open'); hamburger.setAttribute('aria-expanded','false'); });
    });
</script>
</body>
</html>
